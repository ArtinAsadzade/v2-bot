services:
  postgres:
    image: postgres:16-alpine
    container_name: v2bot-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: v2bot
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d v2bot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: v2bot-redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: infra/docker/api/Dockerfile
    container_name: v2bot-api
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
      APP_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/v2bot?schema=public
      REDIS_URL: redis://redis:6379
      API_CORS_ORIGINS: http://localhost:3000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  bot:
    build:
      context: .
      dockerfile: infra/docker/bot/Dockerfile
    container_name: v2bot-bot
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      API_BASE_URL: http://api:4000/v1
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'apps/bot/dist/main.js' >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  admin-panel:
    build:
      context: .
      dockerfile: infra/docker/admin-panel/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    container_name: v2bot-admin-panel
    restart: always
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  postgres-data:
  redis-data:
